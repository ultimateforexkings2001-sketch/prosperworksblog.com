<svg viewBox="0 0 640 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F1B2D" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#0F1B2D" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- panel -->
  <g transform="translate(20,30) rotate(-3 320 210)">
    <rect x="0" y="0" width="600" height="380" rx="18" fill="#ffffff" stroke="#E3E8F0"/>
    <!-- side nav -->
    <rect x="0" y="0" width="64" height="380" rx="18" fill="#0F1B2D"/>
    <rect x="0" y="0" width="34" height="380" fill="#0F1B2D"/>
    <circle cx="32" cy="46" r="11" fill="#2557D6"/>
    <rect x="21" y="86" width="22" height="6" rx="3" fill="#3A4A63"/>
    <rect x="21" y="110" width="22" height="6" rx="3" fill="#3A4A63"/>
    <rect x="21" y="134" width="22" height="6" rx="3" fill="#3A4A63"/>
    <rect x="21" y="158" width="22" height="6" rx="3" fill="#3A4A63"/>

    <!-- header -->
    <text x="88" y="44" font-family="Sora, sans-serif" font-size="18" fill="#0F1B2D" font-weight="700">Pipeline Overview</text>

    <!-- stat cards -->
    <g font-family="Inter, sans-serif">
      <rect x="88" y="66" width="118" height="70" rx="10" fill="#EEF3FC"/>
      <text x="100" y="88" font-size="11" fill="#5B6B7C">Total Leads</text>
      <text x="100" y="112" font-size="19" font-weight="700" fill="#0F1B2D">2,450</text>
      <text x="100" y="127" font-size="10" fill="#1FAA59">▲ 12.5%</text>

      <rect x="216" y="66" width="118" height="70" rx="10" fill="#EEF3FC"/>
      <text x="228" y="88" font-size="11" fill="#5B6B7C">Opportunities</text>
      <text x="228" y="112" font-size="19" font-weight="700" fill="#0F1B2D">1,210</text>
      <text x="228" y="127" font-size="10" fill="#1FAA59">▲ 8.2%</text>

      <rect x="344" y="66" width="118" height="70" rx="10" fill="#EEF3FC"/>
      <text x="356" y="88" font-size="11" fill="#5B6B7C">Win Rate</text>
      <text x="356" y="112" font-size="19" font-weight="700" fill="#0F1B2D">34.6%</text>
      <text x="356" y="127" font-size="10" fill="#1FAA59">▲ 4.7%</text>

      <rect x="472" y="66" width="112" height="70" rx="10" fill="#0F1B2D"/>
      <text x="484" y="88" font-size="11" fill="#B6C2D4">Revenue</text>
      <text x="484" y="112" font-size="19" font-weight="700" fill="#ffffff">$68,450</text>
      <text x="484" y="127" font-size="10" fill="#59E39B">▲ 15.3%</text>
    </g>

    <!-- line chart -->
    <g transform="translate(88,156)">
      <rect x="0" y="0" width="292" height="180" rx="10" fill="#FAFBFE" stroke="#EEF1F6"/>
      <polyline points="14,140 55,120 96,132 137,90 178,100 219,55 260,68 278,40"
                fill="none" stroke="#2557D6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <polygon points="14,140 55,120 96,132 137,90 178,100 219,55 260,68 278,40 278,168 14,168"
               fill="#2557D6" opacity="0.08"/>
    </g>

    <!-- donut chart -->
    <g transform="translate(396,156)">
      <rect x="0" y="0" width="188" height="180" rx="10" fill="#FAFBFE" stroke="#EEF1F6"/>
      <circle cx="60" cy="90" r="42" fill="none" stroke="#DCE4F2" stroke-width="18"/>
      <circle cx="60" cy="90" r="42" fill="none" stroke="#2557D6" stroke-width="18"
              stroke-dasharray="180 264" stroke-linecap="round" transform="rotate(-90 60 90)"/>
      <rect x="122" y="60" width="52" height="7" rx="3.5" fill="#2557D6"/>
      <rect x="122" y="80" width="38" height="7" rx="3.5" fill="#DCE4F2"/>
      <rect x="122" y="100" width="44" height="7" rx="3.5" fill="#DCE4F2"/>
    </g>

    <!-- footer row -->
    <rect x="88" y="346" width="292" height="1" fill="#EEF1F6"/>
  </g>

  <!-- floating success card -->
  <g transform="translate(30,368)">
    <rect x="0" y="0" width="210" height="70" rx="14" fill="#ffffff" stroke="#E3E8F0" filter="url(#cardShadow)"/>
    <circle cx="34" cy="35" r="17" fill="#1FAA59"/>
    <path d="M26 35l6 6 12-13" stroke="#ffffff" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="62" y="30" font-family="Inter, sans-serif" font-size="11" fill="#5B6B7C">Deal Closed</text>
    <text x="62" y="50" font-family="Sora, sans-serif" font-size="17" font-weight="700" fill="#0F1B2D">$24,500</text>
  </g>

  <!-- plant -->
  <g transform="translate(560,300)">
    <path d="M20 90 C0 60 5 30 20 10" stroke="#2E7D4F" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M20 90 C40 65 42 35 24 12" stroke="#3E9963" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M20 90 C15 55 30 40 40 30" stroke="#59B980" stroke-width="6" fill="none" stroke-linecap="round"/>
    <rect x="0" y="90" width="44" height="34" rx="8" fill="#EFEFEF" stroke="#D7D7D7"/>
  </g>
</svg>
